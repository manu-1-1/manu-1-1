<text x="28" y="72" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">Cybersecurity undergraduate at Amrita Vishwa Vidyapeetham with a strong interest in</text><text x="28" y="94" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">software development, computer networks, and artificial intelligence. Passionate about</text><text x="28" y="116" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">building practical applications, exploring how modern technologies work under the hood,</text><text x="28" y="138" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">and solving real-world problems through technology. Experienced with C, C++, Python,</text><text x="28" y="160" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">JavaScript, React, Node.js, Express.js, SQL, and Linux, with hands-on projects in web</text><text x="28" y="182" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">development, networking, and cybersecurity. A fast learner who enjoys working on</text><text x="28" y="204" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">projects that combine software engineering, AI, and security while continuously</text><text x="28" y="226" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">expanding technical knowledge through practical development.</text>
