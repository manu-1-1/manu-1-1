<text x="28" y="72" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ CodeMesh</text><text x="28" y="94" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Unifies repos, live pull requests, team chat, and code snippets into one real-time workspace.</text><text x="28" y="116" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Adds inline threaded code review, role-based access, and an AI assistant that flags vulnerabilities.</text><text x="28" y="138" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  React · Node.js · Socket.io · PostgreSQL · Prisma</text><text x="28" y="160" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ Nuclear-Launch-CRT</text><text x="28" y="182" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Splits a launch code into shares using Chinese Remainder Theorem-based threshold secret sharing.</text><text x="28" y="204" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  C++ engine handles share generation &amp; reconstruction; Node.js manages sessions and API endpoints.</text><text x="28" y="226" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  C++ · Node.js · Cryptography · OOP</text><text x="28" y="248" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ Network Anomaly Detection</text><text x="28" y="270" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Captures live network traffic, extracts features, and classifies flows as normal or malicious.</text><text x="28" y="292" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Trained Random Forest &amp; Decision Tree models on UNSW-NB15 with real-time threat-level scoring.</text><text x="28" y="314" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  Python · Scikit-learn · UNSW-NB15</text><text x="28" y="336" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ Interview Pilot</text><text x="28" y="358" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Ingests resumes, job descriptions, or study docs and indexes them into a vector database.</text><text x="28" y="380" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Generates context-aware mock interview questions via a fully local Llama 3.1 8B model.</text><text x="28" y="402" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  FastAPI · LangChain · ChromaDB · Ollama</text><text x="28" y="424" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ Qickcy</text><text x="28" y="446" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Offline-first Android editor with brightness/contrast, cropping, blur &amp; background removal.</text><text x="28" y="468" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  No accounts, ads, or internet required — undo/redo history and JPEG/PNG/WEBP export built in.</text><text x="28" y="490" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  Kotlin · Jetpack Compose</text><text x="28" y="512" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ MemSys</text><text x="28" y="534" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Simulates OS-style memory allocation using a C++ interval tree to detect overlaps in O(log n).</text><text x="28" y="556" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Flask backend serves a live web UI visualizing allocations, conflicts, and deallocation in real time.</text><text x="28" y="578" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  C++ · Flask · Interval Trees</text><text x="28" y="600" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#00F5D4" xml:space="preserve">▸ Portfolio Website</text><text x="28" y="622" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Hand-built responsive site with Home, About, Projects, and Contact sections plus a downloadable CV.</text><text x="28" y="644" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#CDD9E5" xml:space="preserve">  Focused on clean UI, intuitive navigation, and solidifying core frontend fundamentals.</text><text x="28" y="666" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13.5" fill="#5B6B84" xml:space="preserve">  HTML · CSS · JavaScript</text>
</svg>